server {
    listen 80;
    server_name localhost ethiobuildconnect.et www.ethiobuildconnect.et;
    root /usr/share/nginx/html;
    index index.html;
    sendfile on;
    tcp_nopush on;
    etag on;

    # Serve uploaded media from disk (same path as backend UPLOAD_DIR). Skips Spring for GETs.
    # Mount the host uploads dir read-only into this container, e.g.:
    #   /var/lib/housing-platform/uploads:/var/lib/housing-platform/uploads:ro
    # URL /api/v1/uploads/properties/... maps to .../properties/... under that directory.
    location ^~ /api/v1/uploads/ {
        alias /var/lib/housing-platform/uploads/;
        add_header Accept-Ranges bytes;
        # Upload filenames are UUID-based and immutable; cache aggressively.
        add_header Cache-Control "public, max-age=2592000, immutable";
        expires 30d;
        access_log off;
    }

    # Proxy API to backend. /api/v1/uploads/ is handled above when the volume is mounted; if not,
    # requests fall through only if you add a fallback — with alias present, missing mount returns 404.
    # For local dev without the volume, comment out the block above so all /api/ goes to Spring.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger / OpenAPI — must reach Spring; SPA fallback would serve index.html for /swagger-ui/*
    location ^~ /swagger-ui/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /swagger-ui.html {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api-docs {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /sitemap.xml {
        proxy_pass http://backend:8080/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /v3/api-docs {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve static assets with cache headers
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|mp4|webm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Homepage: exact match so we always emit canonical Link (directory index can bypass @spa otherwise).
    location = / {
        root /usr/share/nginx/html;
        add_header Link "<$scheme://$host/>; rel=canonical" always;
        try_files /index.html =404;
    }

    # Bot detection for Social Media sharing (OpenGraph)
    set $is_bot 0;
    if ($http_user_agent ~* "facebookexternalhit|twitterbot|whatsapp|telegrambot|skypeuripreview|linkedinbot|discordbot|viber") {
        set $is_bot 1;
    }

    # Intercept social crawlers dynamically
    location ~* ^/(properties|buildings|organizations)/([a-zA-Z0-9-]+)$ {
        if ($is_bot = 1) {
            rewrite ^ /seo-proxy$uri break;
            proxy_pass http://backend:8080;
        }
        try_files $uri $uri/ @spa;
    }

    # SPA fallback: serve index.html when no file exists. Emit Link rel=canonical so crawlers see the
    # correct URL before JavaScript runs (same URL as Vue router + meta; Google supports HTTP Link canonical).
    # If TLS terminates in front of nginx, map $http_x_forwarded_proto to scheme and use https in Link.
    location / {
        try_files $uri $uri/ @spa;
    }

    location @spa {
        root /usr/share/nginx/html;
        add_header Link "<$scheme://$host$uri>; rel=canonical" always;
        try_files /index.html =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
